syntax = "proto3";

// Ensure Java packages are generated correctly for the Spring Boot backend
option java_multiple_files = true;
option java_package = "com.searchengine.grpc";
option java_outer_classname = "SearchProto";

service SearchService {
  rpc Search (SearchRequest) returns (SearchResponse);
  rpc Similar (SimilarRequest) returns (SearchResponse);
  rpc Autocomplete (AutocompleteRequest) returns (AutocompleteResponse);
}

message SearchRequest {
  string query = 1;
  int32 top_k = 2;
}

message SimilarRequest {
  string paper_id = 1;
  int32 top_k = 2;
}

message AutocompleteRequest {
  string prefix = 1;
}

message AutocompleteResponse {
  repeated string suggestions = 1;
}

message Paper {
  string id = 1;
  string title = 2;
  string abstract = 3;
  repeated string authors = 4;
  string pdf_url = 5;
}

message SearchResponse {
  repeated Paper papers = 1;
}
